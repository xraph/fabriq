name: Release

# Tag-triggered, mirroring octopus's release split: goreleaser cuts the GitHub
# Release with cross-compiled binaries + a multi-arch ghcr.io image, a sibling
# job packages the Helm chart and publishes it as an OCI artifact (goreleaser
# does not package charts), and an optional job mirrors the image to Docker Hub
# when DOCKERHUB_USERNAME/DOCKERHUB_TOKEN are set.
#
#   git tag v0.2.0 && git push origin v0.2.0
#
# Or trigger it from the Actions UI via the release-dispatch.yml wrapper, which
# validates the tag and pushes it with a PAT.
#
# Pre-release suffixes (v0.2.0-rc.1) are auto-marked pre-release.
on:
  push:
    tags:
      - "v*.*.*"

# One release run per tag; never cancel a release in flight.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  goreleaser:
    name: Binaries & image
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release + upload archives
      packages: write # push the container image to ghcr.io
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the changelog can diff tags

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  helm:
    name: Helm chart
    runs-on: ubuntu-latest
    needs: goreleaser # the release exists before we attach the chart
    permissions:
      contents: write # attach the packaged chart to the release
      packages: write # push the chart as an OCI artifact to ghcr.io
    env:
      CHART_DIR: deploy/helm/fabriq
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Resolve chart version from the tag
        id: ver
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing chart version ${VERSION}"

      - name: Lint chart
        run: helm lint "$CHART_DIR" --set postgres.dsn=postgres://u@h/d --set redis.addr=h:6379

      - name: Package chart
        id: pkg
        run: |
          mkdir -p dist
          helm package "$CHART_DIR" \
            --version "${{ steps.ver.outputs.version }}" \
            --app-version "${{ steps.ver.outputs.version }}" \
            --destination dist
          echo "chart=dist/fabriq-${{ steps.ver.outputs.version }}.tgz" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR (Helm OCI)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push chart to GHCR (OCI)
        run: helm push "${{ steps.pkg.outputs.chart }}" "oci://ghcr.io/${{ github.repository_owner }}/charts"

      - name: Attach chart to the GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ steps.pkg.outputs.chart }}

  # Optional Docker Hub mirror. goreleaser publishes the canonical multi-arch
  # image to ghcr.io; this copies that manifest (all arches, same tags) to
  # Docker Hub with `imagetools create` — only when BOTH DOCKERHUB_USERNAME and
  # DOCKERHUB_TOKEN secrets are set. Override the target repo with the
  # DOCKERHUB_REPO variable (default: xraph/fabriq). Absent the secrets, the
  # job logs a warning and the image stays on ghcr.io only.
  dockerhub:
    name: Mirror image to Docker Hub
    runs-on: ubuntu-latest
    needs: goreleaser # the ghcr.io manifest must exist before we can copy it
    permissions:
      contents: read
      packages: read # read the source manifest from ghcr.io
    env:
      GHCR_IMAGE: ghcr.io/${{ github.repository }}
    steps:
      - name: Resolve version + Docker Hub config
        id: prep
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          # Mirror only when BOTH credentials are present.
          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "repo=${{ vars.DOCKERHUB_REPO || 'xraph/fabriq' }}" >> "$GITHUB_OUTPUT"
            echo "Docker Hub mirroring enabled -> docker.io/${{ vars.DOCKERHUB_REPO || 'xraph/fabriq' }}"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::DOCKERHUB_USERNAME/DOCKERHUB_TOKEN not both set — image published to ghcr.io only."
          fi

      - name: Set up Docker Buildx
        if: steps.prep.outputs.enabled == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.prep.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: steps.prep.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Mirror multi-arch manifest to Docker Hub
        if: steps.prep.outputs.enabled == 'true'
        env:
          VERSION: ${{ steps.prep.outputs.version }}
          REPO: ${{ steps.prep.outputs.repo }}
        run: |
          set -euo pipefail
          # Mirror the same tag set goreleaser pushed to ghcr.io (version,
          # major.minor, latest), all sourced from the canonical :version
          # manifest so every architecture is copied across.
          MAJOR_MINOR="$(printf '%s' "$VERSION" | cut -d. -f1-2)"
          docker buildx imagetools create \
            -t "docker.io/${REPO}:${VERSION}" \
            -t "docker.io/${REPO}:${MAJOR_MINOR}" \
            -t "docker.io/${REPO}:latest" \
            "${GHCR_IMAGE}:${VERSION}"
          docker buildx imagetools inspect "docker.io/${REPO}:${VERSION}"
