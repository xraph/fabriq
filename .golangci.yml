version: "2"

linters:
  default: none
  enable:
    # Core correctness
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign

    # Code quality
    - gocritic
    - revive
    - misspell
    - unconvert
    - unparam
    - prealloc

    # Bug prevention
    - bodyclose
    - noctx
    - rowserrcheck
    - sqlclosecheck
    - gosec
    - errname
    - errorlint

    # Architecture boundaries
    - depguard

    # Style
    - nolintlint
    - whitespace
    - predeclared

  settings:
    depguard:
      rules:
        # Raw datastore drivers are an adapter-only concern. Anything outside
        # adapters/ (plus the test kit's container harness and the migration
        # stream, which needs the grove pg executor) must go through fabriq
        # ports instead.
        drivers-only-in-adapters:
          list-mode: lax
          files:
            - "!**/adapters/**"
            - "!**/fabriqtest/**"
            - "!**/migrations/**"
          deny:
            - pkg: github.com/xraph/grove/drivers
              desc: grove drivers may only be imported under fabriq/adapters
            - pkg: github.com/redis/go-redis
              desc: go-redis may only be imported under fabriq/adapters
            - pkg: github.com/elastic/go-elasticsearch
              desc: the elasticsearch client may only be imported under fabriq/adapters
            - pkg: github.com/FalkorDB/falkordb-go
              desc: the FalkorDB client may only be imported under fabriq/adapters
            - pkg: github.com/jackc/pgx
              desc: pgx is only allowed where grove genuinely cannot express something, under adapters (document in docs/decisions/)
            - pkg: github.com/xraph/grove/kv
              desc: grove kv may only be imported under fabriq/adapters
            - pkg: github.com/xraph/trove
              desc: trove may only be imported under fabriq/adapters
            - pkg: github.com/hashicorp/golang-lru/v2
              desc: golang-lru is an adapter-level cache primitive; use it under fabriq/adapters
        # core/ is the extractable kernel: no domain knowledge, no app
        # framework, no driver packages of any kind.
        core-purity:
          files:
            - "**/core/**"
          deny:
            - pkg: github.com/xraph/fabriq/domain
              desc: core must contain zero domain-specific knowledge
            - pkg: github.com/xraph/fabriq/adapters
              desc: core defines ports; adapters implement them, never the reverse
            - pkg: github.com/xraph/forge
              desc: core is framework-free; forge wiring lives in cmd/ and the facade

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - hugeParam
        - rangeValCopy

    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
          arguments: [checkPrivateReceivers]
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
        - name: unreachable-code

    gosec:
      excludes:
        - G104
        - G304
        - G117 # config structs legitimately carry credential fields
        - G602 # false-positives on fixed-size array indexing (e.g. for i := range arr { arr[i] = … })
        - G705 # experimental XSS taint rule; our HTTP responses are JSON/SSE APIs, never HTML sinks

    errcheck:
      check-type-assertions: true
      # An explicit `_ =` is a deliberate, reviewable discard (defer
      # rollback, best-effort close); forcing handling there breeds noise.
      check-blank: false
      exclude-functions:
        - (io.Closer).Close

    govet:
      enable-all: true
      disable:
        - fieldalignment

  exclusions:
    presets:
      - comments
      - std-error-handling
    rules:
      - path: _test\.go
        linters: [gosec, errcheck, gocritic, noctx]
      - path: fabriqtest/
        linters: [gosec, errcheck]
      # internal/metrics is the spec'd package layout; it never collides in
      # practice (internal import path, no dot-imports allowed).
      - path: internal/metrics/
        text: "avoid package names that conflict"
        linters: [revive]
      # core/crypto is a deliberate package name; it is always imported with the
      # crypto. qualifier (never dot-imported) and no importer also pulls in the
      # stdlib crypto package, so there is no real collision.
      - path: core/crypto/
        text: "avoid package names that conflict"
        linters: [revive]
      # cmd/admin-demo is a local demo/dev server whose startup banner logs
      # operator-supplied config (listen addr, service URLs, blob DSN) and
      # sample curl commands; G706 log-injection does not apply to a hand-run
      # demo printing its own configuration.
      - path: cmd/admin-demo/
        text: "G706"
        linters: [gosec]

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/xraph/fabriq

output:
  sort-order:
    - linter
    - file
