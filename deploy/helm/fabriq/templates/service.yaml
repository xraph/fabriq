apiVersion: v1
kind: Service
metadata:
  name: {{ include "fabriq.fullname" . }}
  labels:
    {{- include "fabriq.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "fabriq.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: worker
