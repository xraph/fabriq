{{- include "fabriq.validate" . -}}
{{- if include "fabriq.postgres.needsChartSecret" . -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "fabriq.fullname" . }}
  labels:
    {{- include "fabriq.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Inline Postgres credentials (dev/CI). Production should reference a
  # managed Secret via postgres.existingSecret or postgres.passwordSecret.
  FABRIQ_POSTGRES_DSN: {{ include "fabriq.postgres.chartDSN" . | quote }}
{{- end }}
