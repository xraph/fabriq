{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "fabriq.serviceAccountName" . }}
  labels:
    {{- include "fabriq.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# fabriq's singletons elect via Postgres advisory locks, not Kubernetes
# Leases — so this ServiceAccount needs no RBAC.
automountServiceAccountToken: false
{{- end }}
