{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "fabriq.fullname" . }}
  labels:
    {{- include "fabriq.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "fabriq.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
    - Ingress
  ingress:
    # Allow scraping /metrics + health on the http port.
    - ports:
        - port: http
          protocol: TCP
  egress:
    # DNS.
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    {{- with .Values.networkPolicy.egress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
