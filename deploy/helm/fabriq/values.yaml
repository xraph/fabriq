# fabriq Helm chart — values
#
# Deploys the fabriq-worker (relay, projection consumers, reconciler,
# document materializer) and a Helm-hook schema migration Job. Datastores
# are EXTERNAL: point the chart at managed Postgres+Timescale, Redis, and
# (optionally) FalkorDB + Elasticsearch. The chart bundles no databases.

image:
  repository: ghcr.io/xraph/fabriq
  # Defaults to .Chart.AppVersion when empty.
  tag: ""
  pullPolicy: IfNotPresent
imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

# --- Optional projection planes ---------------------------------------
# Graph (FalkorDB) and search (Elasticsearch) are optional, derived
# projections. Enabling one here is a statement of intent: the chart then
# REQUIRES that datastore's connection below and fails the install if it
# is missing. The worker itself enables a plane whenever its address is
# present, so leaving these false while still setting an address also
# works — the toggles exist to catch "I meant to wire search" mistakes.
projections:
  graph: false
  search: false

# --- Datastore connections --------------------------------------------
# Datastores are EXTERNAL (managed Postgres+Timescale, Redis, FalkorDB,
# Elasticsearch). Each block accepts a managed-secret reference OR inline
# values; nothing here bundles a database. Only the Postgres DSN is
# sensitive (it carries credentials); the other addresses are host:port.

# Postgres — the source of truth (always required). Supply ONE of:
#   1. existingSecret + dsnKey  — read a full DSN from a Secret you manage
#      (operators like CloudNativePG/Crunchy expose a ready "uri" key).
#   2. dsn                      — a full DSN literal (dev/CI; the chart puts
#      it in its own Secret rather than a ConfigMap).
#   3. host/user/database/...   — compose a DSN from parts; the password may
#      be inline (dev/CI) or pulled from an existing Secret (passwordSecret).
postgres:
  existingSecret: ""
  dsnKey: FABRIQ_POSTGRES_DSN
  dsn: ""
  host: ""
  port: 5432
  database: ""
  user: ""
  sslmode: require
  # Extra DSN query params, appended after sslmode, e.g. "pool_max_conns=20".
  params: ""
  # Password: inline (dev/CI) OR from an existing Secret. When passwordSecret
  # is set the DSN is composed with a $(VAR) reference so the password never
  # leaves its Secret — keep it URL-safe, or use option 1/2 instead.
  password: ""
  passwordSecret: ""
  passwordKey: password

# Redis — event fan-out (required for projections + live subscriptions).
redis:
  existingSecret: ""
  addrKey: FABRIQ_REDIS_ADDR
  addr: "" # host:6379

# FalkorDB — graph projection engine (required when projections.graph).
falkordb:
  existingSecret: ""
  addrKey: FABRIQ_FALKORDB_ADDR
  addr: "" # host:6379

# Elasticsearch — search projection engine (required when projections.search).
elasticsearch:
  existingSecret: ""
  addrsKey: FABRIQ_ELASTICSEARCH_ADDRS
  addrs: "" # comma-separated, e.g. https://host:9200

# --- Non-secret tuning (ConfigMap) ------------------------------------
config:
  # Bind address for health (/_/livez,/_/readyz,/_/health) + /metrics.
  httpAddr: ":8081"
  # Scheduled reconciler cadence (Go duration). "0" disables; empty uses
  # the binary default (5m).
  reconcileInterval: ""
  # Extra plain (non-secret) env vars merged into worker + migrate.
  extraEnv: {}

# --- Schema migrations (Helm hook Job) --------------------------------
migrate:
  enabled: true
  # pre-install + pre-upgrade: the schema is current before the worker
  # rolls. grove holds an advisory migration lock, so parallel hook runs
  # across releases are safe.
  hookWeight: "-5"
  backoffLimit: 3
  podAnnotations: {}
  resources: {}

# --- Worker Deployment -------------------------------------------------
worker:
  # Safe to scale: singletons (relay/reconciler/materializer) are
  # leader-elected via Postgres advisory locks — exactly one active
  # across replicas — while projection consumers share Redis consumer
  # groups and scale freely.
  replicaCount: 2
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 512Mi
  # The worker drains on SIGTERM (~10s); give the pod headroom.
  terminationGracePeriodSeconds: 30
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
  extraVolumes: []
  extraVolumeMounts: []
  # /tmp writable scratch (root filesystem is read-only).
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    fsGroup: 65532
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]

service:
  # Health + /metrics. ClusterIP; not internet-facing.
  port: 8081

# --- Disruption budget -------------------------------------------------
pdb:
  enabled: true
  minAvailable: 1

# --- Autoscaling (CPU; optional) --------------------------------------
# For lag-driven scaling of projection consumers, prefer KEDA on Redis
# stream lag / the fabriq_projection_lag_events metric — see README.
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

# --- Metrics -----------------------------------------------------------
metrics:
  # Add prometheus.io/scrape pod annotations.
  podAnnotations: true
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

serviceAccount:
  create: true
  name: ""
  annotations: {}

# Optional: restrict egress to your datastores (you supply the peers).
networkPolicy:
  enabled: false
  egress: []
