# goreleaser — fabriq release pipeline.
#
# On a `vX.Y.Z` tag the release workflow (.github/workflows/release.yml) runs
# this to: cross-compile the `fabriq` binary for linux/darwin × amd64/arm64,
# archive + checksum them, build a multi-arch container image on ghcr.io, and
# cut a GitHub Release with an auto-generated changelog. The Helm chart is
# published by a sibling job in the same workflow (goreleaser does not package
# charts). Validate locally with `goreleaser check` and
# `goreleaser build --snapshot --clean`.
version: 2

project_name: fabriq

before:
  hooks:
    - go mod tidy

builds:
  - id: fabriq
    main: ./cmd/fabriq
    binary: fabriq
    env:
      - CGO_ENABLED=0 # pure-Go deps (pgx, go-redis); static binary
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: fabriq
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - README.md
      - config.example.yaml

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999

# Multi-arch image (linux/amd64 + linux/arm64) assembled in a single buildx
# pass from the prebuilt binaries — no in-image compile, so the arm64 image just
# packages a cross-compiled binary rather than emulating a toolchain. goreleaser
# builds both platforms at once and pushes one manifest list tagged with the
# full version, major.minor, and latest. The workflow sets up QEMU + buildx and
# logs in to ghcr.io.
#
# Migrated from the deprecated `dockers:` + `docker_manifests:` blocks to
# `dockers_v2:` (https://goreleaser.com/deprecations#dockers). dockers_v2 lays
# the binaries out per-platform in the build context ($TARGETPLATFORM/fabriq),
# so Dockerfile.goreleaser copies via the buildx-provided TARGETPLATFORM arg.
dockers_v2:
  - id: fabriq
    ids:
      - fabriq
    dockerfile: deploy/docker/Dockerfile.goreleaser
    images:
      - "ghcr.io/xraph/fabriq"
    tags:
      - "{{ .Version }}"
      - "{{ .Major }}.{{ .Minor }}"
      - "latest"
    platforms:
      - linux/amd64
      - linux/arm64
    # The previous dockers block produced no SBOM attestations; keep that so the
    # published manifest list keeps the same shape (dockers_v2 attaches one by
    # default).
    sbom: false
    labels:
      org.opencontainers.image.title: fabriq
      org.opencontainers.image.description: "fabriq data fabric: worker + operations CLI"
      org.opencontainers.image.url: https://github.com/xraph/fabriq
      org.opencontainers.image.source: https://github.com/xraph/fabriq
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.licenses: Apache-2.0

release:
  github:
    owner: xraph
    name: fabriq
  prerelease: auto # vX.Y.Z-rc.1 etc. are marked pre-release
  draft: false
  name_template: "fabriq {{ .Tag }}"
  footer: |
    ## Container image

    ```bash
    docker pull ghcr.io/xraph/fabriq:{{ .Version }}
    ```

    ## Helm chart

    ```bash
    helm install fabriq oci://ghcr.io/xraph/charts/fabriq --version {{ .Version }}
    ```
