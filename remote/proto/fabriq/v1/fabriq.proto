syntax = "proto3";

package fabriq.v1;

option go_package = "github.com/xraph/fabriq/remote/fabriqpb;fabriqpb";

// Fabriq is the wire form of core/query.Fabric — the OPTIONAL remote face of
// the embedded library (ADR 0009). Backends only; no browser, so gRPC/HTTP2 is
// unconstrained. Tenant + principal travel in CALL METADATA, authenticated at
// the server edge — never in these messages.
service Fabriq {
  // --- writes: atomic, server-side PG tx + outbox + lifecycle hook + RLS ---
  rpc Exec(ExecRequest) returns (ExecReply);
  rpc ExecBatch(ExecBatchRequest) returns (ExecBatchReply); // one tx, all-or-nothing

  // --- reads ---
  rpc Get(GetRequest) returns (RowReply);
  rpc List(ListRequest) returns (stream RowReply);       // cursor-paged stream
  rpc GetMany(GetManyRequest) returns (stream RowReply); // batched; no N+1

  // --- knowledge retrieval: the projection-read channels the agent toolkit's
  //     recall fuses (semantic / lexical / graph). Reply rows are opaque JSON. ---
  rpc VectorSimilar(VectorSimilarRequest) returns (RowReply); // rows = JSON []VectorMatch
  rpc VectorUpsert(VectorUpsertRequest) returns (Ack);
  rpc VectorDelete(VectorDeleteRequest) returns (Ack);
  rpc VectorDeleteByMeta(VectorDeleteByMetaRequest) returns (Ack);
  rpc VectorGet(VectorGetRequest) returns (VectorGetReply); // embedding = []float32
  rpc Search(SearchRequest) returns (RowReply);  // rows = JSON []map
  rpc GraphQuery(GraphQueryRequest) returns (RowReply); // rows = JSON []string | []map

  // --- timeseries (core/query.TSQuerier): telemetry ingest + windowed reads.
  //     BulkWrite bypasses the outbox (see core/query/ports.go); Range rows are
  //     opaque JSON like the other projection reads. ---
  rpc TSBulkWrite(TSBulkWriteRequest) returns (Ack);
  rpc TSRange(TSRangeRequest) returns (RowReply);

  // --- subscribe: server-streamed conflated channel deltas. The first frame is
  //     a handshake (open, or a setup error); each subsequent frame is a Delta. ---
  rpc Subscribe(SubscribeRequest) returns (stream SubFrame);

  // --- live query: server-streamed maintained window. The first frame carries
  //     the snapshot (or a setup error); each subsequent frame is one delta.
  //     Reanchor (deep scroll) needs the bidi Live RPC below and is a follow-on. ---
  rpc LiveQuery(LiveQueryRequest) returns (stream LiveFrame);

  // --- live: bidi. client sends subscribe/reanchor/unsubscribe; server streams
  //     snapshot (as reset+enter) then enter/leave/move/update deltas. ---
  rpc Live(stream ClientCommand) returns (stream Frame);

  // --- blobs (core/blob.Store): bytes stream, metadata is unary. PutBlob /
  //     GetBlob never buffer a whole object. PresignBlob returns a short-lived
  //     URL so large/hot bytes go client<->store DIRECT, bypassing this tier. ---
  rpc PutBlob(stream BlobChunk) returns (BlobInfoReply);
  rpc GetBlob(BlobKey) returns (stream GetBlobFrame);
  rpc HeadBlob(BlobKey) returns (BlobInfoReply);
  rpc DeleteBlob(BlobKey) returns (BlobAck);
  rpc PresignBlob(BlobPresign) returns (BlobPresignReply);

  // NOTE: there is deliberately no interactive (multi-round-trip) transaction
  // RPC. fabriq has no held transactions by design — ExecBatch is the
  // transaction surface (N commands, one PG tx, all-or-nothing). See ADR 0009.
}

// Command mirrors core/command.Command. payload is the entity's grove model as
// OPAQUE bytes (canonical JSON today). The registry — not this schema — owns
// payload shape, so dynamic entities and map-native writes cross unchanged.
// op is "create" | "update" | "delete" | "upsert".
message Command {
  string entity = 1;
  string op = 2;
  string agg_id = 3;
  bytes payload = 4;
  optional int64 expected_version = 5;
}

message Result {
  string agg_id = 1;
  int64 version = 2;
  string event_id = 3;
}

// Error carries fabriq's typed-error taxonomy so the client rebuilds
// errors.Is-matchable sentinels. code is stable: "not_found",
// "version_conflict", "no_tenant", "not_configured", "internal".
message Error {
  string code = 1;
  string message = 2;
  string agg_id = 3; // rich variants (version_conflict)
  int64 version = 4;
}

message ExecRequest { Command command = 1; }
message ExecReply {
  Result result = 1;
  Error error = 2;
}
message ExecBatchRequest { repeated Command commands = 1; }
message ExecBatchReply {
  repeated Result results = 1;
  Error error = 2;
}

// --- reads (body is opaque JSON, like Command.payload) ---
message GetRequest { string entity = 1; string id = 2; }
message GetManyRequest { string entity = 1; repeated string ids = 2; }
message ListRequest { string entity = 1; bytes query = 2; } // query = JSON ListQuery
message RowReply { bytes row = 1; Error error = 2; }        // row = JSON model

// --- knowledge retrieval (vector / search / graph projection reads) ---
message Ack { Error error = 1; }
message VectorSimilarRequest {
  string entity = 1;
  repeated float embedding = 2;
  int32 k = 3;
  bytes filter = 4; // JSON map[string]string
}
message VectorDeleteByMetaRequest {
  string entity = 1;
  bytes filter = 2; // JSON map[string]string
}
message VectorUpsertRequest {
  string entity = 1;
  string id = 2;
  repeated float embedding = 3;
  bytes meta = 4; // JSON map[string]any
}
message VectorDeleteRequest {
  string entity = 1;
  string id = 2;
}
message VectorGetRequest {
  string entity = 1;
  string id = 2;
}
// VectorGetReply carries the raw float components of a stored embedding.
// On miss the server sets error (code "not_found") and leaves embedding empty.
message VectorGetReply {
  repeated float embedding = 1;
  Error error = 2;
}
message SearchRequest { bytes query = 1; } // JSON query.SearchQuery
message GraphQueryRequest {
  string cypher = 1;
  bytes params = 2; // JSON map[string]any
  string mode = 3;  // "ids" → []string, else → []map
}

// --- timeseries (query.TSQuerier) ---
message TSBulkWriteRequest {
  string series = 1;
  bytes points = 2; // JSON []query.Point
}
message TSRangeRequest {
  bytes query = 1; // JSON query.RangeQuery
}

// --- subscribe (conflated channel deltas) ---
message SubscribeRequest { SubscribeScope scope = 1; }
message SubscribeScope {
  string entity = 1;
  string scope = 2; // scope name declared on the entity ("id", "site", "tenant", …)
  string id = 3;    // scope id (ignored for tenant scope)
}
message Delta {
  string stream_id = 1;
  string channel = 2;
  string tenant_id = 3;
  string aggregate = 4;
  string agg_id = 5;
  int64 version = 6;
  string type = 7;
  int64 at_unix_nano = 8; // delivery timestamp, unix nanos
  bytes payload = 9;      // opaque JSON
}
// SubFrame is one frame of the Subscribe stream: the first is the handshake
// (open, or error on a setup failure such as authz); the rest carry one Delta.
message SubFrame {
  bool open = 1;
  Error error = 2;
  Delta delta = 3;
}

// --- live query (maintained, ordered, filtered window) ---
message LiveQueryRequest { bytes query = 1; } // JSON livequery.LiveQuery
// LiveFrame: the first frame carries the snapshot (or a setup error); each
// subsequent frame carries one delta. Bodies are opaque JSON.
message LiveFrame {
  bytes snapshot = 1; // JSON livequery.Snapshot (first frame)
  bytes delta = 2;    // JSON livequery.LiveDelta
  Error error = 3;    // setup error (handshake)
}

// --- live (mirrors gateway/protocol.go) ---
message ClientCommand {
  string action = 1; // "subscribe" | "reanchor" | "unsubscribe"
  bytes query = 2;   // JSON LiveQuery (subscribe)
  bytes cursor = 3;  // JSON Cursor (reanchor)
  int32 limit = 4;
}
message Frame {
  string op = 1; // "enter" | "leave" | "move" | "update" | "reset"
  string agg_id = 2;
  int64 version = 3;
  bytes row = 4;
  int32 old_index = 5;
  int32 new_index = 6;
  bytes cursor = 7;
  string stream_id = 8;
}

// --- blobs (core/blob.Store) ---
// PutBlob upload stream: the first frame carries metadata (key, content_type,
// size), each subsequent frame carries data bytes.
message BlobChunk {
  string key = 1;
  string content_type = 2;
  int64 size = 3; // declared size on the metadata frame, -1 if unknown
  bytes data = 4; // data frames
}
message BlobKey { string key = 1; }
message BlobObjectInfo {
  string key = 1;
  int64 size = 2;
  string checksum = 3;
  string content_type = 4;
  int64 modified_at_unix_nano = 5;
}
message BlobInfoReply {
  BlobObjectInfo info = 1;
  Error error = 2;
}
message BlobAck { Error error = 1; }
// GetBlob download stream: the first frame carries the object metadata (or a
// setup error such as not_found); each subsequent frame carries data bytes.
message GetBlobFrame {
  BlobObjectInfo info = 1;
  bytes data = 2;
  Error error = 3;
}
message BlobPresign {
  string key = 1;
  string method = 2; // "GET" | "PUT"
  int64 ttl_seconds = 3;
}
message BlobPresignReply {
  string url = 1;
  Error error = 2;
}

// Interactive transactions are a deliberate non-goal (see the service note and
// ADR 0009); ExecBatch is the transaction surface.
